function Provider({ children }) {
  const [lang, setLang] = useState('es');
  const [currency, setCurrency] = useState('USD');
  const [page, setPage] = useState('home');
  const [cookies, setCookies] = useState(null);
  const [user, setUser] = useState(null);
  const [pageData, setPageData] = useState(null);
  const t = useCallback((p) => { let v = T[lang]; for (const k of p.split('.')) v = v?.[k]; return v || p; }, [lang]);
  const fmt = useCallback((usd) => { const c = CURRENCIES[currency]; return new Intl.NumberFormat(c.locale, { style: 'currency', currency, minimumFractionDigits: c.dec ?? 2, maximumFractionDigits: c.dec ?? 2 }).format(usd * c.rate); }, [currency]);
  const go = useCallback((pg, data) => { setPage(pg); setPageData(data || null); window.scrollTo({ top: 0, behavior: 'smooth' }); }, []);
  return <Ctx.Provider value={{ lang, setLang, currency, setCurrency, page, go, cookies, setCookies, user, setUser, pageData, t, fmt }}>{children}</Ctx.Provider>;
}
