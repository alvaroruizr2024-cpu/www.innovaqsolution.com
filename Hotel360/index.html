<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOTEL 360 - Global Smart ERP Suite | InnovaQ Solutions</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{navy:'#0f172a','navy-light':'#1e293b',teal:'#14b8a6','teal-dark':'#0d9488'}}}}</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>*{font-family:'Inter',sans-serif}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#475569;border-radius:3px}.stat-card{transition:all .2s}.stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,.1)}</style>
</head>
<body class="bg-gray-50">
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;
const{LineChart,Line,BarChart,Bar,XAxis,YAxis,CartesianGrid,Tooltip,Legend,ResponsiveContainer,PieChart,Pie,Cell}=Recharts;

const COLORS=['#14b8a6','#6366f1','#f59e0b','#ef4444','#8b5cf6'];
const revenueData=[{day:'Mon',revenue:4200,revpar:145},{day:'Tue',revenue:5800,revpar:155},{day:'Wed',revenue:7200,revpar:168},{day:'Thu',revenue:8500,revpar:178},{day:'Fri',revenue:9800,revpar:195},{day:'Sat',revenue:8200,revpar:185},{day:'Sun',revenue:6500,revpar:162}];
const occupancyData=[{week:'W1',actual:78,target:75},{week:'W2',actual:82,target:80},{week:'W3',actual:85,target:82},{week:'W4',actual:88,target:85}];
const channelData=[{name:'Direct',value:45},{name:'Booking.com',value:25},{name:'Expedia',value:15},{name:'GDS',value:10},{name:'Other',value:5}];

const reservations=[
{id:'RES-001',guest:'Sarah Jenkins',status:'In-House',dates:'Oct 24 - Oct 28',room:'402',type:'Deluxe King',balance:0,source:'Direct'},
{id:'RES-002',guest:'Michael Chen',status:'Arrival',dates:'Oct 25 - Oct 27',room:'Unassigned',type:'Standard Queen',balance:450,source:'Booking.com'},
{id:'RES-003',guest:'Emma Thompson',status:'Departure',dates:'Oct 20 - Oct 25',room:'510',type:'Suite',balance:120.5,source:'Expedia'},
{id:'RES-004',guest:'David Rodriguez',status:'In-House',dates:'Oct 22 - Oct 26',room:'305',type:'Standard Double',balance:0,source:'Corporate'},
{id:'RES-005',guest:'Lisa Wong',status:'Arrival',dates:'Oct 25 - Oct 29',room:'Unassigned',type:'Deluxe King',balance:890,source:'Direct'}
];

const guests=[
{name:'Eleanor Rigby',id:'G-10294',tier:'Platinum',points:124500,ltv:14500,lastStay:'2 weeks ago'},
{name:'James Bond',id:'G-88392',tier:'Gold',points:45200,ltv:6200,lastStay:'3 months ago'},
{name:'Bruce Wayne',id:'G-44512',tier:'Diamond',points:350000,ltv:85000,lastStay:'Yesterday'},
{name:'Diana Prince',id:'G-11204',tier:'Silver',points:12000,ltv:1800,lastStay:'6 months ago'}
];

const purchaseOrders=[
{po:'PO-2026-089',vendor:'Sysco Foods',amount:4520,date:'Oct 24',status:'Pending Approval'},
{po:'PO-2026-088',vendor:'Ecolab',amount:1250,date:'Oct 23',status:'Approved'},
{po:'PO-2026-087',vendor:'Standard Textile',amount:3800,date:'Oct 21',status:'Received'},
{po:'PO-2026-086',vendor:'Nespresso',amount:850,date:'Oct 18',status:'Paid'}
];

const budgetData=[{m:'Jan',actual:42000,budget:45000},{m:'Feb',actual:44000,budget:45000},{m:'Mar',actual:48000,budget:46000},{m:'Apr',actual:43000,budget:45000},{m:'May',actual:47000,budget:46000},{m:'Jun',actual:45000,budget:45000}];

const StatusBadge=({status})=>{const c={
'In-House':'bg-blue-100 text-blue-700','Arrival':'bg-teal-100 text-teal-700','Departure':'bg-orange-100 text-orange-700',
'Pending Approval':'bg-yellow-100 text-yellow-700','Approved':'bg-green-100 text-green-700','Received':'bg-blue-100 text-blue-700','Paid':'bg-purple-100 text-purple-700'
}[status]||'bg-gray-100 text-gray-700';
return <span className={`px-2.5 py-1 rounded-full text-xs font-medium ${c}`}>{status}</span>};

const TierBadge=({tier})=>{const c={Platinum:'bg-gray-800 text-white',Gold:'bg-yellow-500 text-white',Diamond:'bg-purple-600 text-white',Silver:'bg-gray-400 text-white'}[tier];
return <span className={`px-2 py-0.5 rounded text-xs font-bold ${c}`}>{tier}</span>};

const KPICard=({title,value,change,positive,icon})=>(
<div className="stat-card bg-white rounded-xl p-5 border border-gray-100 shadow-sm">
<div className="flex justify-between items-start"><div><p className="text-sm text-gray-500">{title}</p><h3 className="text-2xl font-bold text-gray-900 mt-1">{value}</h3></div>
<div className="text-3xl opacity-20">{icon}</div></div>
<p className={`text-xs mt-2 ${positive?'text-teal-600':'text-red-500'}`}>{positive?'\u2197':'\u2198'} {change}</p></div>);

const SidebarItem=({label,icon,active,onClick})=>(
<button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all ${active?'bg-teal-500/20 text-teal-400':'text-gray-400 hover:bg-white/5 hover:text-gray-200'}`}>
<span className="text-lg">{icon}</span>{label}</button>);

const DashboardPage=()=>(
<div><div className="flex justify-between items-center mb-6"><h1 className="text-2xl font-bold text-gray-900">Dashboard Overview</h1>
<div className="flex gap-3"><select className="border rounded-lg px-3 py-2 text-sm"><option>Today</option></select>
<button className="bg-teal-500 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-teal-600">Download Report</button></div></div>
<div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
<KPICard title="Total Revenue" value="$45,231.89" change="+20.1% vs last period" positive icon="\ud83d\udcb0"/>
<KPICard title="Occupancy Rate" value="82.5%" change="+4.1% vs last period" positive icon="\ud83c\udfe8"/>
<KPICard title="RevPAR" value="$185.20" change="-1.2% vs last period" positive={false} icon="\ud83d\udcc8"/>
<KPICard title="Active Guests" value="342" change="+12.5% vs last period" positive icon="\ud83d\udc65"/></div>
<div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
<div className="bg-white rounded-xl p-5 border shadow-sm"><h3 className="font-semibold mb-4">Revenue vs RevPAR Trend</h3>
<ResponsiveContainer width="100%" height={250}><LineChart data={revenueData}><CartesianGrid strokeDasharray="3 3"/><XAxis dataKey="day"/><YAxis yAxisId="left"/><YAxis yAxisId="right" orientation="right"/>
<Tooltip/><Legend/><Line yAxisId="left" type="monotone" dataKey="revenue" stroke="#14b8a6" name="Total Revenue" strokeWidth={2}/>
<Line yAxisId="right" type="monotone" dataKey="revpar" stroke="#6366f1" name="RevPAR" strokeWidth={2}/></LineChart></ResponsiveContainer></div>
<div className="bg-white rounded-xl p-5 border shadow-sm"><h3 className="font-semibold mb-4">Occupancy Forecast</h3>
<ResponsiveContainer width="100%" height={250}><BarChart data={occupancyData}><CartesianGrid strokeDasharray="3 3"/><XAxis dataKey="week"/>
<YAxis/><Tooltip/><Legend/><Bar dataKey="actual" fill="#14b8a6" name="Actual Occupancy" radius={[4,4,0,0]}/>
<Bar dataKey="target" fill="#cbd5e1" name="Target Occupancy" radius={[4,4,0,0]}/></BarChart></ResponsiveContainer></div></div>
<div className="bg-white rounded-xl p-5 border shadow-sm"><h3 className="font-semibold mb-4">AI Smart Alerts</h3>
<div className="space-y-4">
<div className="flex items-start gap-3 p-3 bg-green-50 rounded-lg"><span className="w-2 h-2 rounded-full bg-green-500 mt-2"></span><div className="flex-1"><p className="font-medium text-sm">High Demand Detected</p><p className="text-xs text-gray-600">Local event 'Tech Summit 2026' causing spike in searches. Dynamic pricing increased BAR by 15%.</p></div><span className="text-xs text-gray-400">10 mins ago</span></div>
<div className="flex items-start gap-3 p-3 bg-blue-50 rounded-lg"><span className="w-2 h-2 rounded-full bg-blue-500 mt-2"></span><div className="flex-1"><p className="font-medium text-sm">Housekeeping Optimization</p><p className="text-xs text-gray-600">Route optimized for Floor 4. Expected completion time reduced by 22 mins.</p></div><span className="text-xs text-gray-400">1 hour ago</span></div>
<div className="flex items-start gap-3 p-3 bg-purple-50 rounded-lg"><span className="w-2 h-2 rounded-full bg-purple-500 mt-2"></span><div className="flex-1"><p className="font-medium text-sm">VIP Arrival</p><p className="text-xs text-gray-600">Guest John Doe (Platinum) arriving in 2 hours. Room 402 inspected and minibar stocked with preferences.</p></div><span className="text-xs text-gray-400">2 hours ago</span></div>
</div></div></div>);

const PMSPage=()=>{const[tab,setTab]=useState('reservations');
return(<div><div className="flex justify-between items-center mb-6"><div><h1 className="text-2xl font-bold">Core PMS & Operations</h1><p className="text-sm text-gray-500">Manage reservations, front desk, and housekeeping.</p></div>
<div className="flex gap-3"><button className="border px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-50">\ud83d\udcc5 Tape Chart</button>
<button className="bg-teal-500 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-teal-600">New Reservation</button></div></div>
<div className="flex gap-4 mb-6 border-b">{['reservations','frontdesk','housekeeping'].map(t=>(
<button key={t} onClick={()=>setTab(t)} className={`pb-3 px-1 text-sm font-medium border-b-2 ${tab===t?'border-teal-500 text-teal-600':'border-transparent text-gray-500'}`}>
{t==='reservations'?'Reservations':t==='frontdesk'?'Front Desk':'Housekeeping'}</button>))}</div>
{tab==='reservations'&&<div className="bg-white rounded-xl border shadow-sm"><div className="p-4 border-b"><input placeholder="Search by name, confirmation number, or room..." className="w-full md:w-96 border rounded-lg px-4 py-2 text-sm"/></div>
<table className="w-full"><thead><tr className="text-left text-xs text-gray-500 uppercase border-b"><th className="p-4">Guest</th><th>Status</th><th>Dates</th><th>Room</th><th>Balance</th><th></th></tr></thead>
<tbody>{reservations.map(r=><tr key={r.id} className="border-b hover:bg-gray-50"><td className="p-4"><div className="flex items-center gap-3">
<div className="w-9 h-9 rounded-full bg-teal-100 text-teal-700 flex items-center justify-center text-sm font-bold">{r.guest.split(' ').map(n=>n[0]).join('')}</div>
<div><p className="font-medium text-sm">{r.guest}</p><p className="text-xs text-gray-500">{r.id} \u2022 {r.source}</p></div></div></td>
<td><StatusBadge status={r.status}/></td><td className="text-sm">{r.dates}</td>
<td><p className="text-sm">{r.room}</p><p className="text-xs text-gray-500">{r.type}</p></td>
<td className="text-sm font-medium">${r.balance.toFixed(2)}</td><td className="text-gray-400">\u22ef</td></tr>)}</tbody></table></div>}
{tab==='frontdesk'&&<div className="bg-white rounded-xl border shadow-sm p-6"><h3 className="font-semibold mb-4">Today's Front Desk Activity</h3>
<div className="grid grid-cols-3 gap-4 mb-6"><div className="text-center p-4 bg-teal-50 rounded-xl"><p className="text-3xl font-bold text-teal-600">12</p><p className="text-sm text-gray-600">Arrivals</p></div>
<div className="text-center p-4 bg-blue-50 rounded-xl"><p className="text-3xl font-bold text-blue-600">8</p><p className="text-sm text-gray-600">Departures</p></div>
<div className="text-center p-4 bg-purple-50 rounded-xl"><p className="text-3xl font-bold text-purple-600">3</p><p className="text-sm text-gray-600">VIP Guests</p></div></div>
<p className="text-sm text-gray-500">Average check-in time: <span className="font-bold text-teal-600">38 seconds</span> (Target: &lt;45s)</p></div>}
{tab==='housekeeping'&&<div className="bg-white rounded-xl border shadow-sm p-6"><h3 className="font-semibold mb-4">Room Status Board</h3>
<div className="grid grid-cols-4 gap-4 mb-6"><div className="text-center p-4 bg-red-50 rounded-xl border-2 border-red-200"><p className="text-2xl font-bold text-red-600">24</p><p className="text-sm">Dirty</p></div>
<div className="text-center p-4 bg-yellow-50 rounded-xl border-2 border-yellow-200"><p className="text-2xl font-bold text-yellow-600">18</p><p className="text-sm">In Progress</p></div>
<div className="text-center p-4 bg-green-50 rounded-xl border-2 border-green-200"><p className="text-2xl font-bold text-green-600">156</p><p className="text-sm">Clean</p></div>
<div className="text-center p-4 bg-gray-50 rounded-xl border-2 border-gray-200"><p className="text-2xl font-bold text-gray-600">4</p><p className="text-sm">Out of Order</p></div></div>
<p className="text-sm text-gray-500">Efficiency: <span className="font-bold text-teal-600">19 rooms/shift</span> (Target: 18-20)</p></div>}</div>)};

const RevenuePage=()=>(
<div><div className="flex justify-between items-center mb-6"><div><h1 className="text-2xl font-bold">Revenue Intelligence</h1><p className="text-sm text-gray-500">Dynamic pricing, channel management, and distribution.</p></div>
<div className="flex gap-3"><button className="border px-4 py-2 rounded-lg text-sm">\u2699\ufe0f Pricing Rules</button>
<button className="bg-teal-500 text-white px-4 py-2 rounded-lg text-sm font-medium">Update Rates</button></div></div>
<div className="grid grid-cols-4 gap-4 mb-6">
<KPICard title="RevPAR Index (RGI)" value="108.4" change="+2.1 pts vs compset" positive icon="\ud83d\udcc8"/>
<KPICard title="Direct Booking Share" value="45%" change="+5% vs last month" positive icon="\ud83c\udf10"/>
<KPICard title="Channel Cost Ratio" value="11.2%" change="-0.8% target <12%" positive icon="\ud83d\udcb2"/>
<KPICard title="AI Rate Decisions" value="96/day" change="Autonomous adjustments" positive icon="\ud83e\udde0"/></div>
<div className="grid grid-cols-2 gap-6 mb-6">
<div className="bg-white rounded-xl p-5 border shadow-sm"><div className="flex justify-between items-center mb-4"><h3 className="font-semibold">Dynamic Pricing Engine (Today)</h3>
<span className="px-3 py-1 bg-teal-100 text-teal-700 rounded-full text-xs font-medium">AI Auto-Pilot Active</span></div>
<ResponsiveContainer width="100%" height={250}><LineChart data={revenueData}><CartesianGrid strokeDasharray="3 3"/>
<XAxis dataKey="day"/><YAxis/><Tooltip/><Line type="monotone" dataKey="revpar" stroke="#14b8a6" strokeWidth={2} dot={{r:5}}/></LineChart></ResponsiveContainer></div>
<div className="bg-white rounded-xl p-5 border shadow-sm"><h3 className="font-semibold mb-4">Channel Mix</h3>
<ResponsiveContainer width="100%" height={250}><PieChart><Pie data={channelData} cx="50%" cy="50%" outerRadius={80} dataKey="value" label={({name,percent})=>`${name} ${(percent*100).toFixed(0)}%`}>
{channelData.map((e,i)=><Cell key={i} fill={COLORS[i]}/>)}</Pie><Tooltip/></PieChart></ResponsiveContainer></div></div></div>);

const GuestPage=()=>(
<div><div className="flex justify-between items-center mb-6"><div><h1 className="text-2xl font-bold">Guest Intelligence & CRM</h1><p className="text-sm text-gray-500">Hyper-personalization, loyalty, and communications.</p></div>
<div className="flex gap-3"><button className="border px-4 py-2 rounded-lg text-sm">\ud83d\udcac Campaigns</button>
<button className="bg-teal-500 text-white px-4 py-2 rounded-lg text-sm font-medium">New Guest Profile</button></div></div>
<div className="grid grid-cols-4 gap-4 mb-6">
<KPICard title="Guest Recognition Rate" value="97.2%" change="Target >95%" positive icon="\ud83c\udfaf"/>
<KPICard title="Upsell Conversion" value="14.5%" change="AI Recommendations" positive icon="\u2b50"/>
<KPICard title="NPS Score" value="72" change="+5 vs last quarter" positive icon="\ud83d\ude0a"/>
<KPICard title="Active Loyalty Members" value="12,450" change="+8.2% growth" positive icon="\ud83d\udc51"/></div>
<div className="grid grid-cols-3 gap-6">
<div className="col-span-2 bg-white rounded-xl border shadow-sm"><div className="p-4 border-b flex justify-between items-center"><h3 className="font-semibold">Global Guest Profiles</h3>
<input placeholder="Search guests..." className="border rounded-lg px-3 py-1.5 text-sm w-48"/></div>
<table className="w-full"><thead><tr className="text-left text-xs text-gray-500 uppercase border-b"><th className="p-4">Guest</th><th>Loyalty Tier</th><th>LTV</th><th>Last Stay</th></tr></thead>
<tbody>{guests.map(g=><tr key={g.id} className="border-b hover:bg-gray-50"><td className="p-4"><div className="flex items-center gap-3">
<div className="w-9 h-9 rounded-full bg-gray-200 flex items-center justify-center text-sm font-bold">{g.name.split(' ').map(n=>n[0]).join('')}</div>
<div><p className="font-medium text-sm">{g.name}</p><p className="text-xs text-gray-500">{g.id}</p></div></div></td>
<td><TierBadge tier={g.tier}/><p className="text-xs text-gray-500 mt-1">{g.points.toLocaleString()} pts</p></td>
<td className="font-medium text-sm">${g.ltv.toLocaleString()}</td><td className="text-sm text-gray-500">{g.lastStay}</td></tr>)}</tbody></table></div>
<div className="space-y-4">
<div className="bg-white rounded-xl border shadow-sm p-5"><h3 className="font-semibold mb-3">AI Sentiment Analysis</h3>
<div className="space-y-3">
<div className="p-3 bg-green-50 rounded-lg"><p className="text-xs font-bold text-green-700">POSITIVE (82%)</p><p className="text-xs text-gray-600">"Excellent service", "Clean room"</p><div className="w-full bg-green-200 rounded-full h-1.5 mt-2"><div className="bg-green-500 h-1.5 rounded-full" style={{width:'82%'}}></div></div></div>
<div className="p-3 bg-yellow-50 rounded-lg"><p className="text-xs font-bold text-yellow-700">NEUTRAL (12%)</p><p className="text-xs text-gray-600">"Okay breakfast", "Standard size"</p><div className="w-full bg-yellow-200 rounded-full h-1.5 mt-2"><div className="bg-yellow-500 h-1.5 rounded-full" style={{width:'12%'}}></div></div></div>
<div className="p-3 bg-red-50 rounded-lg"><p className="text-xs font-bold text-red-700">NEGATIVE (6%)</p><p className="text-xs text-gray-600">"Slow wifi", "Noisy AC"</p><div className="w-full bg-red-200 rounded-full h-1.5 mt-2"><div className="bg-red-500 h-1.5 rounded-full" style={{width:'6%'}}></div></div></div></div></div>
<div className="bg-white rounded-xl border border-red-200 shadow-sm p-5"><h3 className="font-semibold text-red-700 mb-2">\u26a0\ufe0f Service Recovery Alert</h3>
<p className="text-xs text-red-600">Negative Review Detected</p><p className="text-xs text-gray-600 mt-1">TripAdvisor review mentions "cold shower" in Room 304. Guest is still in-house.</p>
<button className="mt-3 text-xs bg-red-100 text-red-700 px-3 py-1.5 rounded-lg font-medium hover:bg-red-200">Trigger Recovery Workflow</button></div></div></div></div>);

const BackOfficePage=()=>(
<div><div className="flex justify-between items-center mb-6"><div><h1 className="text-2xl font-bold">Smart Back-Office</h1><p className="text-sm text-gray-500">Accounting, procurement, and supply chain management.</p></div>
<button className="bg-teal-500 text-white px-4 py-2 rounded-lg text-sm font-medium">New Purchase Order</button></div>
<div className="grid grid-cols-4 gap-4 mb-6">
<KPICard title="F&B Cost Variance" value="1.8%" change="Target <2%" positive icon="\ud83c\udf7d\ufe0f"/>
<KPICard title="Procurement Savings" value="9.2%" change="Target >8%" positive icon="\ud83d\udcb0"/>
<KPICard title="Open POs" value="23" change="5 pending approval" positive={false} icon="\ud83d\udcdd"/>
<KPICard title="Invoice Processing" value="48hrs" change="Avg processing time" positive icon="\u23f1\ufe0f"/></div>
<div className="grid grid-cols-3 gap-6 mb-6">
<div className="col-span-2 bg-white rounded-xl p-5 border shadow-sm"><h3 className="font-semibold mb-4">Operating Expenses: Budget vs Actual</h3>
<ResponsiveContainer width="100%" height={250}><BarChart data={budgetData}><CartesianGrid strokeDasharray="3 3"/><XAxis dataKey="m"/>
<YAxis/><Tooltip/><Legend/><Bar dataKey="actual" fill="#0f172a" name="Actual" radius={[4,4,0,0]}/>
<Bar dataKey="budget" fill="#cbd5e1" name="Budget" radius={[4,4,0,0]}/></BarChart></ResponsiveContainer></div>
<div className="space-y-4">
<div className="bg-orange-50 border border-orange-200 rounded-xl p-4"><h4 className="font-semibold text-sm text-orange-800">\ud83d\udca1 Food Waste Prediction</h4>
<p className="text-xs text-orange-700 mt-2">Based on occupancy forecast and historical data, reduce breakfast pastry order by 15% for next week.</p>
<button className="mt-3 text-xs bg-orange-100 text-orange-800 px-3 py-1.5 rounded-lg font-medium">Apply Adjustment</button></div>
<div className="bg-red-50 border border-red-200 rounded-xl p-4"><h4 className="font-semibold text-sm text-red-800">\ud83d\udea8 Financial Anomaly Detected</h4>
<p className="text-xs text-red-700 mt-2">Unusual spike in linen replacement costs detected for Q3. Isolation Forest model flags 99% confidence.</p>
<button className="mt-3 text-xs bg-red-100 text-red-800 px-3 py-1.5 rounded-lg font-medium">View Report</button></div></div></div>
<div className="bg-white rounded-xl border shadow-sm"><div className="p-4 border-b flex justify-between"><h3 className="font-semibold">Recent Purchase Orders</h3><a href="#" className="text-teal-600 text-sm">View All</a></div>
<table className="w-full"><thead><tr className="text-left text-xs text-gray-500 uppercase border-b"><th className="p-4">PO Number</th><th>Vendor</th><th>Amount</th><th>Date</th><th>Status</th></tr></thead>
<tbody>{purchaseOrders.map(p=><tr key={p.po} className="border-b hover:bg-gray-50"><td className="p-4 text-sm font-medium text-teal-600">{p.po}</td>
<td className="text-sm">{p.vendor}</td><td className="text-sm font-medium">${p.amount.toLocaleString()}.00</td>
<td className="text-sm text-gray-500">{p.date}</td><td><StatusBadge status={p.status}/></td></tr>)}</tbody></table></div></div>);

const App=()=>{const[page,setPage]=useState('dashboard');const[sidebarOpen]=useState(true);
const pages={dashboard:<DashboardPage/>,pms:<PMSPage/>,revenue:<RevenuePage/>,guest:<GuestPage/>,backoffice:<BackOfficePage/>};
const nav=[{id:'dashboard',label:'Dashboard',icon:'\ud83d\udcca'},{id:'pms',label:'PMS & Operations',icon:'\ud83c\udfe8'},{id:'revenue',label:'Revenue & Dist',icon:'\ud83d\udcc8'},{id:'guest',label:'Guest CRM',icon:'\ud83d\udc65'},{id:'backoffice',label:'Back-Office',icon:'\ud83c\udfdb\ufe0f'}];
return(
<div className="flex h-screen bg-gray-50">
