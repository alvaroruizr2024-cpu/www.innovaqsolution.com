// ─── API CALL ──────────────────────────────────────────────────────────────────
async function callClaude(systemPrompt, userMessage) {
  const response = await fetch("https://erp360-proxy.alvaro-ruiz-r-2024.workers.dev", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{ role: "user", content: userMessage }],
    }),
  });
  const data = await response.json();
  if (data.error) throw new Error(data.error.message);
  return data.content[0].text;
}

  const [selectedProduct, setSelectedProduct] = useState("SIG 360°");
  const [query, setQuery] = useState("");
  const [stage, setStage] = useState(0);
  const [agentResponses, setAgentResponses] = useState({});
  const [rankings, setRankings] = useState({});
  const [finalResponse, setFinalResponse] = useState("");
  const [error, setError] = useState("");
  const [activeRankTab, setActiveRankTab] = useState(0);
  const [aggregateRanks, setAggregateRanks] = useState({});
  const [filterCategory, setFilterCategory] = useState("Todos");
  const bottomRef = useRef(null);

  const config = COUNCIL_CONFIGS[selectedProduct];

  useEffect(() => {
    if (stage > 0) bottomRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [stage, finalResponse]);

  function reset() {
    setStage(0); setAgentResponses({}); setRankings({});
    setFinalResponse(""); setError(""); setAggregateRanks({}); setActiveRankTab(0);
  }

  const filteredProducts = Object.entries(COUNCIL_CONFIGS).filter(
    ([, cfg]) => filterCategory === "Todos" || cfg.category === filterCategory
  );

  const uniqueCategories = ["Todos", ...new Set(Object.values(COUNCIL_CONFIGS).map(c => c.category))];

  async function runCouncil() {
    if (!query.trim()) return;
    reset();
    setError("");

    try {
      // ── STAGE 1 ──────────────────────────────────────────────────────────────
      setStage(1);
      const responses = {};
      for (const agent of config.agents) {
        const res = await callClaude(agent.persona, query);
        responses[agent.name] = res;
        setAgentResponses(prev => ({ ...prev, [agent.name]: res }));
      }

      // ── STAGE 2 ──────────────────────────────────────────────────────────────
      setStage(2);
      const labels = config.agents.map((_, i) => String.fromCharCode(65 + i));
      const labelMap = {};
      config.agents.forEach((a, i) => { labelMap[labels[i]] = a.name; });

      const anonymized = config.agents.map((a, i) =>
        `Respuesta ${labels[i]}:\n${responses[a.name]}`
      ).join("\n\n---\n\n");

      const rankingPrompt = `Consulta:\n"${query}"\n\nRespuestas anónimas de especialistas del Council:\n\n${anonymized}\n\nEvalúa cada respuesta por precisión técnica, profundidad y utilidad práctica para la consulta. Proporciona tu análisis crítico de cada una y termina EXACTAMENTE con:\n\nRANKING FINAL:\n1. Respuesta [letra]\n2. Respuesta [letra]\n3. Respuesta [letra]${config.agents.length > 3 ? "\n4. Respuesta [letra]" : ""}`;

      const rankResponses = {};
      for (const agent of config.agents) {
        const rankRes = await callClaude(
          agent.persona + " Además, actúas como evaluador crítico e imparcial de respuestas de otros especialistas.",
          rankingPrompt
        );
        rankResponses[agent.name] = rankRes;
        setRankings(prev => ({ ...prev, [agent.name]: rankRes }));
      }

      // Aggregate ranking calculation
      const rankScores = {};
      config.agents.forEach(a => { rankScores[a.name] = 0; });
      let validRankCount = 0;
      Object.values(rankResponses).forEach(rankText => {
        const lines = rankText.split("\n").filter(l => /^\d+\.\s*Respuesta\s+[A-Z]/i.test(l));
        if (lines.length > 0) {
          lines.forEach((line, pos) => {
            const m = line.match(/Respuesta\s+([A-Z])/i);
            if (m && labelMap[m[1].toUpperCase()]) {
              rankScores[labelMap[m[1].toUpperCase()]] += (pos + 1);
            }
          });
          validRankCount++;
        }
      });
      if (validRankCount > 0) {
        const sorted = Object.entries(rankScores)
          .sort((a, b) => a[1] - b[1])
          .reduce((acc, [name], i) => { acc[name] = i + 1; return acc; }, {});
        setAggregateRanks(sorted);
      }

      // ── STAGE 3 ──────────────────────────────────────────────────────────────
      setStage(3);
      const synthesisPrompt = `Consulta original:\n"${query}"\n\nAnálisis de los agentes del Council ${selectedProduct}:\n\n${config.agents.map(a => `${a.name}:\n${responses[a.name]}`).join("\n\n---\n\n")}\n\nEvaluaciones cruzadas del Council:\n\n${config.agents.map(a => `${a.name} (evaluador):\n${rankResponses[a.name]}`).join("\n\n---\n\n")}\n\nElabora el DICTAMEN FINAL del Council ${selectedProduct} con la siguiente estructura:\n\n1. RESUMEN EJECUTIVO\n2. ANÁLISIS INTEGRADO\n3. DICTAMEN / RECOMENDACIÓN\n4. ACCIONES INMEDIATAS (con plazos)\n5. RIESGOS SI NO SE ACTÚA`;

      const finalRes = await callClaude(config.chairman.persona, synthesisPrompt);
      setFinalResponse(finalRes);
      setStage(4);

    } catch (err) {
      setError(err.message);
      setStage(0);
    }
  }

  const isRunning = stage > 0 && stage < 4;

  return (
    <div style={{ minHeight: "100vh", background: "#050505", color: "#ddd", fontFamily: "system-ui, sans-serif" }}>
      <style>{`
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        @keyframes shimmer { 0%{box-shadow:0 0 20px ${config.color}11} 100%{box-shadow:0 0 40px ${config.color}33} }
        * { box-sizing: border-box; }
        button { cursor: pointer; transition: all 0.2s; }
        button:hover { opacity: 0.85; }
        textarea { transition: border-color 0.2s; }
        textarea:focus { outline: none; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #1f1f1f; border-radius: 3px; }
      `}</style>

      {/* HEADER */}
      <div style={{
        position: "sticky", top: 0, zIndex: 200,
        background: "#050505cc", backdropFilter: "blur(12px)",
        borderBottom: "1px solid #0f0f0f",
        padding: "14px 32px",
        display: "flex", alignItems: "center", justifyContent: "space-between",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{
            width: 34, height: 34, borderRadius: 8,
            background: `linear-gradient(135deg, ${config.color}, ${config.accent})`,
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: 16, fontWeight: 900,
          }}>⚡</div>
          <div>
            <div style={{ fontSize: 15, fontWeight: 800, letterSpacing: "-0.3px" }}>
              INNOVAQ <span style={{ color: config.color }}>Council Engine</span>
            </div>
            <div style={{ fontSize: 10, color: "#333", fontFamily: "monospace", letterSpacing: 1 }}>
              SUITE COMPLETA — 13 MÓDULOS — MULTI-AGENT DELIBERATION v2.0
            </div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          <StagePill label="Etapa 1: Análisis" active={stage === 1} done={stage > 1} />
          <StagePill label="Etapa 2: Peer Review" active={stage === 2} done={stage > 2} />
          <StagePill label="Etapa 3: Dictamen" active={stage === 3} done={stage === 4} />
        </div>
      </div>

      <div style={{ maxWidth: 1200, margin: "0 auto", padding: "28px 24px 80px" }}>

        <textarea
          value={query}
          onChange={e => setQuery(e.target.value)}
          placeholder={config.placeholder}
          disabled={isRunning}
          rows={4}
          style={{
            width: "100%", background: "#080808",
            border: `1px solid ${query ? config.color + "33" : "#111"}`,
            borderRadius: 10, padding: 14,
            color: "#ddd", fontSize: 13.5, lineHeight: 1.65,
            resize: "vertical", fontFamily: "inherit", marginBottom: 14,
          }}
        />

        {/* ACTION BUTTONS */}
        <div style={{ display: "flex", gap: 10, marginBottom: 32 }}>
          <button onClick={runCouncil} disabled={!query.trim() || isRunning} style={{
            padding: "11px 24px", borderRadius: 9, border: "none",
            background: !query.trim() || isRunning
              ? "#111"
              : `linear-gradient(135deg, ${config.color}, ${config.accent})`,
            color: !query.trim() || isRunning ? "#2a2a2a" : "#000",
            fontWeight: 800, fontSize: 13,
            display: "flex", alignItems: "center", gap: 8,
          }}>
            {isRunning
              ? `⟳ Procesando Council${stage === 1 ? " — Etapa 1/3" : stage === 2 ? " — Etapa 2/3" : " — Etapa 3/3"}...`
              : `⚡ Iniciar Council ${selectedProduct}`}
          </button>
          {stage === 4 && (
            <button onClick={reset} style={{
              padding: "11px 18px", borderRadius: 9,
              border: "1px solid #1a1a1a", background: "transparent",
              color: "#555", fontWeight: 600, fontSize: 13,
            }}>↺ Nueva Consulta</button>
          )}
        </div>

        {/* ERROR */}
        {error && (
          <div style={{
            background: "#150505", border: "1px solid #ff000022",
            borderRadius: 8, padding: 14, marginBottom: 24,
            color: "#ff6b6b", fontSize: 12, fontFamily: "monospace",
          }}>⚠ {error}</div>
        )}

        {/* STAGE 1 */}
        {stage >= 1 && (
          <div style={{ marginBottom: 30, animation: "fadeUp 0.4s ease" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
              <div style={{
                padding: "3px 10px", borderRadius: 5,
                background: stage > 1 ? "#0a1f0a" : "#0a0f1f",
                border: `1px solid ${stage > 1 ? "#2DC65344" : config.color + "44"}`,
                color: stage > 1 ? "#2DC653" : config.color,
                fontSize: 10, fontFamily: "monospace", fontWeight: 700,
              }}>{stage > 1 ? "✓ ETAPA 1 — COMPLETADA" : "⟳ ETAPA 1 — ANÁLISIS INDIVIDUAL"}</div>
              <span style={{ color: "#2a2a2a", fontSize: 12 }}>Agentes trabajando en paralelo, sin cross-talk</span>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))", gap: 12 }}>
              {config.agents.map(agent => (
                <AgentCard
                  key={agent.name} agent={agent}
                  response={agentResponses[agent.name]}
                  loading={stage === 1}
                  rank={aggregateRanks[agent.name]}
                />
              ))}
            </div>
          </div>
        )}

        {/* STAGE 2 */}
        {stage >= 2 && (
          <div style={{ marginBottom: 30, animation: "fadeUp 0.4s ease" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
              <div style={{
                padding: "3px 10px", borderRadius: 5,
                background: stage > 2 ? "#0a1f0a" : "#0a0f1f",
                border: `1px solid ${stage > 2 ? "#2DC65344" : config.color + "44"}`,
                color: stage > 2 ? "#2DC653" : config.color,
                fontSize: 10, fontFamily: "monospace", fontWeight: 700,
              }}>{stage > 2 ? "✓ ETAPA 2 — COMPLETADA" : "⟳ ETAPA 2 — PEER REVIEW ANÓNIMO"}</div>
              <span style={{ color: "#2a2a2a", fontSize: 12 }}>Respuestas anonimizadas — eliminando sesgo inter-modelo</span>
            </div>

            {/* Rank tabs */}
            <div style={{ display: "flex", borderBottom: "1px solid #111", marginBottom: 12, gap: 2 }}>
              {config.agents.map((agent, i) => (
                <button key={agent.name} onClick={() => setActiveRankTab(i)} style={{
                  padding: "6px 14px", border: "none",
                  borderBottom: `2px solid ${activeRankTab === i ? agent.color : "transparent"}`,
                  background: "transparent",
                  color: activeRankTab === i ? agent.color : "#333",
                  fontSize: 11, fontWeight: 600, fontFamily: "monospace",
                }}>
                  {agent.name.replace("Agente ", "").toUpperCase()}
                </button>
              ))}
            </div>

            <div style={{
              background: "#080808",
              border: `1px solid ${config.agents[activeRankTab]?.color + "22"}`,
              borderRadius: "0 8px 8px 8px", padding: 16, minHeight: 80,
            }}>
              {rankings[config.agents[activeRankTab]?.name] ? (
                <div style={{ color: "#bbb", fontSize: 12.5, lineHeight: 1.75, whiteSpace: "pre-wrap", fontFamily: "Georgia, serif" }}>
                  {rankings[config.agents[activeRankTab]?.name]}
                </div>
              ) : (
                <div style={{ color: "#1a1a1a", fontSize: 12, fontFamily: "monospace" }}>
                  {stage === 2 ? "evaluando respuestas anónimas..." : "pendiente"}
                </div>
              )}
            </div>

            {/* Aggregate ranking bar */}
            {Object.keys(aggregateRanks).length > 0 && (
              <div style={{
                marginTop: 14, background: "#080808",
                border: "1px solid #FFD70015", borderRadius: 10, padding: 14,
              }}>
                <div style={{ fontSize: 10, color: "#FFD700", fontFamily: "monospace", fontWeight: 700, marginBottom: 10, letterSpacing: 1 }}>
                  RANKING AGREGADO DEL COUNCIL
                </div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  {Object.entries(aggregateRanks)
                    .sort((a, b) => a[1] - b[1])
                    .map(([name, rank]) => {
                      const agent = config.agents.find(a => a.name === name);
                      const medals = ["🥇", "🥈", "🥉", "4°"];
                      return (
                        <div key={name} style={{
                          display: "flex", alignItems: "center", gap: 7,
                          padding: "5px 12px", borderRadius: 8,
                          border: `1px solid ${agent?.color + "22"}`,
                          background: agent?.color + "06",
                          fontSize: 11,
                        }}>
                          <span>{medals[rank - 1]}</span>
                          <span style={{ color: agent?.color, fontWeight: 700 }}>{name}</span>
                        </div>
                      );
                    })}
                </div>
              </div>
            )}
          </div>
        )}

        {/* STAGE 3 — FINAL */}
        {stage >= 3 && (
          <div style={{ animation: "fadeUp 0.4s ease" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
              <div style={{
                padding: "3px 10px", borderRadius: 5,
                background: stage === 4 ? "#0a1f0a" : "#1a1400",
                border: `1px solid ${stage === 4 ? "#2DC65344" : "#FFD70044"}`,
                color: stage === 4 ? "#2DC653" : "#FFD700",
                fontSize: 10, fontFamily: "monospace", fontWeight: 700,
              }}>{stage === 4 ? "✓ DICTAMEN FINAL EMITIDO" : "⟳ CHAIRMAN SINTETIZANDO..."}</div>
              <span style={{ color: "#2a2a2a", fontSize: 12 }}>👑 {config.chairman.name}</span>
            </div>

            <div style={{
              background: "#080808",
              border: `1px solid ${stage === 4 ? "#FFD70022" : "#111"}`,
              borderRadius: 14, padding: 24,
              animation: stage === 4 ? "shimmer 3s ease infinite alternate" : "none",
            }}>
              {finalResponse ? (
                <>
                  <div style={{
                    display: "flex", alignItems: "center", gap: 10,
                    paddingBottom: 16, marginBottom: 16,
                    borderBottom: "1px solid #111",
                  }}>
                    <span style={{ fontSize: 22 }}>👑</span>
                    <div>
                      <div style={{ color: "#FFD700", fontWeight: 800, fontSize: 14 }}>{config.chairman.name}</div>
                      <div style={{ color: "#2a2a2a", fontSize: 10, fontFamily: "monospace" }}>
                        DICTAMEN FINAL — COUNCIL {selectedProduct.toUpperCase()} — INNOVAQ SOLUTIONS SAC
                      </div>
                    </div>
                  </div>
                  <div style={{ color: "#ccc", fontSize: 13.5, lineHeight: 1.85, whiteSpace: "pre-wrap", fontFamily: "Georgia, serif" }}>
                    {finalResponse}
                  </div>
                </>
              ) : (
                <div style={{ color: "#1a1a1a", fontSize: 12, fontFamily: "monospace" }}>
                  El Chairman está integrando los análisis del Council...
                </div>
              )}
            </div>
          </div>
        )}

        <div ref={bottomRef} />
      </div>

      {/* FOOTER */}
      <div style={{
        borderTop: "1px solid #0a0a0a",
        padding: "14px 32px",
        display: "flex", justifyContent: "space-between", alignItems: "center",
      }}>
        <div style={{ fontSize: 10, color: "#1a1a1a", fontFamily: "monospace" }}>
          INNOVAQ SOLUTIONS SAC — RUC 20606205105 — Trujillo, La Libertad, Perú
        </div>
        <div style={{ fontSize: 10, color: "#1a1a1a", fontFamily: "monospace" }}>
          Council Engine v2.0 — 13 módulos — Inspirado en Karpathy LLM Council
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<INNOVAQCouncilEngine />, document.getElementById('root'));
</script>
</body>
</html>
