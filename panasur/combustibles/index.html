        @media (max-width: 380px) { .stat-value { font-size: 22px; } .card { padding: 14px; } }

</head>

    <script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ─── Supabase Config ───
const SUPABASE_URL = "https://uinoropxppiuqgzktqjr.supabase.co";
const SUPABASE_KEY = "sb_publishable_NHPCpOgHh5c-m-t9s4KhIw_xO4fRrtE";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ─── Constants ───
const CHECKLIST_ITEMS = [
  { id: "bandeja", label: "Bandeja antiderrames colocada bajo boca de llenado", critical: true },
  { id: "kit_antiderrame", label: "Kit antiderrames disponible y completo", critical: true },

];

function fmtDate(d) { if(!d) return ""; return new Date(d+"T00:00:00").toLocaleDateString("es-PE",{day:"2-digit",month:"2-digit",year:"numeric"}); }

// ─── SVG Icons ───
function Icon({ name, size=20, color="currentColor" }) {
  const paths = {
    fuel: <><path d="M3 22V6a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v16"/><path d="M15 10h2a2 2 0 0 1 2 2v2a2 2 0 0 0 2 2v0a1 1 0 0 0 1-1V9l-3-3"/><path d="M3 22h12"/><rect x="6" y="8" width="6" height="4" rx="1"/></>,
    dashboard: <><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="4" rx="1"/><rect x="14" y="10" width="7" height="11" rx="1"/><rect x="3" y="13" width="7" height="8" rx="1"/></>,
    list: <><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></>,
    truck: <><path d="M1 3h15v13H1z"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></>,
    settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
    plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
    back: <polyline points="15 18 9 12 15 6"/>,
    alert: <><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>,
    check: <><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></>,
    download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
    trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>,
    cloud: <><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></>,
    user: <><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,

  return <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}>{paths[name]}</svg>;
}

// ─── Supabase API Helpers ───
async function loadFlota() {
  const { data, error } = await supabase.from('panasur_flota').select('*').eq('activo', true).order('id');
  if (error) { console.error(error); return []; }
  return data || [];
}

async function loadRecords() {
  const { data, error } = await supabase.from('panasur_despachos_combustible').select('*').order('fecha', {ascending:false}).order('hora', {ascending:false}).limit(500);
  if (error) { console.error(error); return []; }
  return (data || []).map(r => ({
    id: r.id,
    equipoId: r.equipo_id,
    fecha: r.fecha,
    hora: r.hora?.slice(0,5) || '',
    tipoCombustible: r.tipo_combustible,
    galones: r.galones,
    costo: r.costo,
    horometro: r.horometro,
    odometro: r.odometro,
    progresiva: r.progresiva,
    operador: r.operador,
    observaciones: r.observaciones,
    checklist: r.checklist || {},
    diaOk: r.dia_cumple,
    creadoPor: r.creado_por,
    timestamp: r.created_at,
  }));
}

async function loadConfig() {
  const { data } = await supabase.from('panasur_config').select('*');
  const cfg = {};
  (data||[]).forEach(c => cfg[c.key] = c.value);
  return {
    precioDiesel: cfg.precios?.diesel || 14.50,
    precioGasoline: cfg.precios?.gasolina || 16.80,
    alertaConsumo: cfg.alertas?.consumo_max_despacho || 20,
  };
}

async function saveRecord(form, currentUser) {
  const critOk = CHECKLIST_ITEMS.filter(c=>c.critical).every(c=>form.checklist[c.id]);
  const payload = {
    equipo_id: form.equipoId,
    fecha: form.fecha,
    hora: form.hora + ':00',
    tipo_combustible: form.tipoCombustible,
    galones: parseFloat(form.galones),
    costo: parseFloat(form.costo) || 0,
    horometro: form.horometro ? parseFloat(form.horometro) : null,
    odometro: form.odometro ? parseFloat(form.odometro) : null,
    progresiva: form.progresiva || null,
    operador: form.operador || null,
    observaciones: form.observaciones || null,
    checklist: form.checklist,
    dia_cumple: critOk,
    creado_por: currentUser || null,
  };
  const { data, error } = await supabase.from('panasur_despachos_combustible').insert(payload).select().single();
  if (error) throw error;
  return data;
}

async function deleteRecord(id) {
  const { error } = await supabase.from('panasur_despachos_combustible').delete().eq('id', id);
  if (error) throw error;
}

async function saveConfig(settings) {
  await Promise.all([
    supabase.from('panasur_config').update({value: {diesel: settings.precioDiesel, gasolina: settings.precioGasoline}, updated_at: new Date().toISOString()}).eq('key', 'precios'),
    supabase.from('panasur_config').update({value: {consumo_max_despacho: settings.alertaConsumo}, updated_at: new Date().toISOString()}).eq('key', 'alertas'),
  ]);
}

// ─── Main App ───
function App() {
  const [fleet, setFleet] = useState([]);
  const [records, setRecords] = useState([]);
  const [settings, setSettings] = useState({ precioDiesel:14.50, precioGasoline:16.80, alertaConsumo:20 });
  const [view, setView] = useState("dashboard");
  const [detailRecord, setDetailRecord] = useState(null);
  const [loading, setLoading] = useState(true);
  const [syncStatus, setSyncStatus] = useState("syncing"); // online | offline | syncing
  const [currentUser, setCurrentUser] = useState(() => localStorage.getItem(USER_KEY) || "");
  const [toast, setToast] = useState(null);

  const showToast = (msg, error=false) => { setToast({msg, error}); setTimeout(()=>setToast(null), 3000); };

  // Initial load + realtime subscription
  useEffect(() => {
    (async () => {
      setSyncStatus("syncing");
      try {
        const [f, r, c] = await Promise.all([loadFlota(), loadRecords(), loadConfig()]);
        setFleet(f);
        setRecords(r);
        setSettings(c);
        setSyncStatus("online");
        setLoading(false);
      } catch(e) {
        console.error(e);
        setSyncStatus("offline");
        setLoading(false);
        showToast("Error de conexión. Modo offline.", true);
      }
    })();

    // Realtime subscription - all users see new records instantly
    const channel = supabase
      .channel('panasur-despachos')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'panasur_despachos_combustible' }, 
        async (payload) => {
          const r = await loadRecords();
          setRecords(r);
          if (payload.eventType === 'INSERT' && payload.new.creado_por !== currentUser) {
            showToast(`Nuevo despacho: ${payload.new.equipo_id}`);
          }
        })
      .subscribe();

    return () => { supabase.removeChannel(channel); };
  }, [currentUser]);

  const handleAddRecord = async (form) => {
    setSyncStatus("syncing");
    try {
      await saveRecord(form, currentUser);
      const r = await loadRecords();
      setRecords(r);
      setSyncStatus("online");
      showToast("Despacho guardado en la nube ✓");
      setView("records");
    } catch(e) {
      setSyncStatus("offline");
      showToast("Error al guardar: " + e.message, true);
    }
  };

  const handleDelete = async (id) => {
    if (!confirm("¿Eliminar este registro de despacho?")) return;
    try {
      await deleteRecord(id);
      setRecords(prev => prev.filter(r => r.id !== id));
      showToast("Registro eliminado ✓");
    } catch(e) {
      showToast("Error: " + e.message, true);
    }
  };

  const handleSaveSettings = async (newSettings) => {
    try {
      await saveConfig(newSettings);
      setSettings(newSettings);
      showToast("Configuración guardada ✓");
    } catch(e) {
      showToast("Error: " + e.message, true);
    }
  };

  const handleSetUser = (name) => {
    setCurrentUser(name);
    localStorage.setItem(USER_KEY, name);
  };

  const openDetail = (r) => { setDetailRecord(r); setView("detail"); };

  const exportCSV = () => {
    if(records.length===0) return showToast("No hay registros para exportar.", true);
    const headers = "ID,Equipo,Tipo,Fecha,Hora,Combustible,Galones,Costo,Horómetro,Odómetro,Progresiva,Operador,DIA_Cumple,Creado_Por,Observaciones\n";
    const rows = records.map(r => {
      const eq = fleet.find(f=>f.id===r.equipoId);
      return [r.id,r.equipoId,eq?.tipo||"",r.fecha,r.hora,r.tipoCombustible,r.galones,r.costo,r.horometro||"",r.odometro||"",r.progresiva||"",r.operador||"",r.diaOk?"SI":"NO",r.creadoPor||"",`"${(r.observaciones||"").replace(/"/g,"''")}"`].join(",");
    }).join("\n");
    const blob = new Blob(["\ufeff"+headers+rows], {type:"text/csv;charset=utf-8;"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `PANASUR_Combustible_${new Date().toISOString().split("T")[0]}.csv`;
    a.click();
    showToast("CSV descargado ✓");
  };

  if (loading) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",flexDirection:"column",gap:20}}>
      <div className="spinner"/>
      <p style={{color:"var(--amber)",fontSize:14}}>Conectando con la nube...</p>
    </div>
  );

  if (!currentUser) return <UserSetup onSetUser={handleSetUser}/>;

  return (
    <div className="app-container">
      {toast && <div className={`toast ${toast.error?'error':''}`}>{toast.msg}</div>}
      
      <div className="header">
        <div className="header-inner">
          <div className="header-left">
            <div className="header-icon"><Icon name="fuel" size={18} color="#000"/></div>
            <div>
              <h1 className="header-title">PANASUR</h1>
              <p className="header-sub">Control de Combustible</p>
            </div>
          </div>
          <div className="header-right">
            <p>CSF Hanaqpampa</p>
            <div className={`sync-badge ${syncStatus==='online'?'sync-online':syncStatus==='syncing'?'sync-syncing pulse':'sync-offline'}`}>
              <Icon name="cloud" size={10}/>
              {syncStatus==='online'?'EN LÍNEA':syncStatus==='syncing'?'SINC...':'SIN CONEXIÓN'}
            </div>
          </div>
        </div>
      </div>

      <div className="content fade-in" key={view}>
        {view === "dashboard" && <Dashboard fleet={fleet} records={records} settings={settings} onNav={setView} onExport={exportCSV}/>}
        {view === "new" && <NewRecord fleet={fleet} onSave={handleAddRecord} onCancel={()=>setView("dashboard")} settings={settings}/>}
        {view === "records" && <RecordsList fleet={fleet} records={records} onNav={setView} onDetail={openDetail} onExport={exportCSV}/>}
        {view === "fleet" && <FleetView fleet={fleet} records={records}/>}
        {view === "settings" && <SettingsView settings={settings} onSave={handleSaveSettings} records={records} currentUser={currentUser} onChangeUser={()=>{localStorage.removeItem(USER_KEY); setCurrentUser("");}}/>}
        {view === "detail" && detailRecord && <RecordDetail fleet={fleet} record={detailRecord} onBack={()=>{setDetailRecord(null);setView("records");}} onDelete={(id)=>{handleDelete(id);setDetailRecord(null);setView("records");}}/>}
      </div>

      <div className="bottom-nav">
        {[
          {k:"dashboard",icon:"dashboard",label:"Inicio"},
          {k:"records",icon:"list",label:"Registros"},
          {k:"new",icon:"plus",label:"Nuevo",fab:true},
          {k:"fleet",icon:"truck",label:"Flota"},
          {k:"settings",icon:"settings",label:"Config"},
        ].map(item => (
          <button key={item.k} className={`nav-item ${view===item.k?"active":""}`} onClick={()=>setView(item.k)}>
            {item.fab ? <div className="nav-fab"><Icon name={item.icon} size={20} color="#000"/></div> : <Icon name={item.icon} size={20}/>}
            <span>{item.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

// ─── Dashboard ───
function Dashboard({ fleet, records, settings, onNav, onExport }) {
  const today = new Date().toISOString().split("T")[0];
  const todayRecs = records.filter(r => r.fecha === today);
  const now = new Date();
  const monthRecs = records.filter(r => { const d=new Date(r.fecha+"T00:00:00"); return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear(); });
  
  const galToday = todayRecs.reduce((s,r)=>s+(parseFloat(r.galones)||0),0);
  const galMonth = monthRecs.reduce((s,r)=>s+(parseFloat(r.galones)||0),0);
  const costMonth = monthRecs.reduce((s,r)=>s+(parseFloat(r.costo)||0),0);
  const avgGal = monthRecs.length>0 ? galMonth/monthRecs.length : 0;

  const alertRecs = records.filter(r => !r.diaOk).slice(0,3);

  const usage = {};
  monthRecs.forEach(r => { usage[r.equipoId] = (usage[r.equipoId]||0) + (parseFloat(r.galones)||0); });
  const topC = Object.entries(usage).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxC = topC.length>0 ? topC[0][1] : 1;

  return (
    <div className="scrollable">
      <div className="grid-2" style={{marginBottom:16}}>
        <div className="card">
          <p style={{fontSize:11,color:"var(--text-muted)",fontWeight:600,marginBottom:8}}>HOY</p>
          <p className="stat-value" style={{color:"var(--amber)"}}>{galToday.toFixed(1)}</p>
          <p style={{fontSize:11,color:"var(--text-secondary)",marginTop:4}}>galones · {todayRecs.length} despachos</p>
        </div>
        <div className="card">
          <p style={{fontSize:11,color:"var(--text-muted)",fontWeight:600,marginBottom:8}}>MES</p>
          <p className="stat-value" style={{color:"var(--blue)"}}>{galMonth.toFixed(0)}</p>
          <p style={{fontSize:11,color:"var(--text-secondary)",marginTop:4}}>galones · {monthRecs.length} reg.</p>
        </div>
        <div className="card">
          <p style={{fontSize:11,color:"var(--text-muted)",fontWeight:600,marginBottom:8}}>COSTO MES</p>
          <p className="stat-value" style={{color:"var(--green)"}}>{costMonth > 999 ? `${(costMonth/1000).toFixed(1)}k` : costMonth.toFixed(0)}</p>
          <p style={{fontSize:11,color:"var(--text-secondary)",marginTop:4}}>soles acumulado</p>
        </div>
        <div className="card">
          <p style={{fontSize:11,color:"var(--text-muted)",fontWeight:600,marginBottom:8}}>PROMEDIO</p>
          <p className="stat-value" style={{color:"var(--text-primary)"}}>{avgGal.toFixed(1)}</p>
          <p style={{fontSize:11,color:"var(--text-secondary)",marginTop:4}}>gal/despacho</p>
        </div>
      </div>

      <div className="card dia-banner" style={{marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
          <span style={{color:"var(--amber)"}}><Icon name="alert" size={18}/></span>
          <p style={{fontSize:12,fontWeight:700,color:"var(--amber)"}}>RESTRICCIÓN DIA — CSF HANAQPAMPA</p>
        </div>
        <p style={{fontSize:12,color:"var(--text-secondary)",lineHeight:1.5}}>
          Bandejas antiderrames obligatorias. Mantenimiento mecánico prohibido en área de proyecto. Kit antiderrames y extintor requeridos en cada despacho.
        </p>
      </div>

      {alertRecs.length > 0 && (
        <div style={{marginBottom:16}}>
          <p style={{fontSize:12,fontWeight:700,color:"var(--red)",marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
            <Icon name="alert" size={16}/> INCUMPLIMIENTOS DIA
          </p>
          {alertRecs.map(r => {
            const missing = CHECKLIST_ITEMS.filter(c=>c.critical && !(r.checklist||{})[c.id]);
            return (
              <div key={r.id} className="alert-banner">
                <span style={{color:"var(--red)",flexShrink:0,marginTop:2}}><Icon name="alert" size={16}/></span>
                <div>
                  <p style={{fontSize:12,fontWeight:600,color:"var(--red)"}}>{r.equipoId} · {fmtDate(r.fecha)}</p>
                  <p style={{fontSize:11,color:"var(--text-muted)",marginTop:2}}>{missing.map(m=>m.label.substring(0,40)+"...").join("; ")}</p>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {topC.length > 0 && (
        <div className="card" style={{marginBottom:16}}>
          <p style={{fontSize:12,fontWeight:700,color:"var(--text-secondary)",marginBottom:14}}>TOP CONSUMIDORES — MES</p>
          {topC.map(([id,gal]) => {
            const eq = fleet.find(f=>f.id===id);
            return (
              <div key={id} style={{marginBottom:12}}>
                <div className="flex-between" style={{marginBottom:4}}>
                  <span style={{fontSize:12,fontWeight:600}}>{id}</span>
                  <span className="mono" style={{fontSize:12,color:"var(--amber)"}}>{gal.toFixed(1)} gal</span>
                </div>
                <div className="progress-bar">
                  <div className="progress-fill" style={{width:`${(gal/maxC)*100}%`,background: gal > settings.alertaConsumo*5 ? "var(--red)" : "var(--amber)"}}/>
                </div>
                <p style={{fontSize:10,color:"var(--text-muted)",marginTop:2}}>{eq?.tipo||""}</p>
              </div>
            );
          })}
        </div>
      )}

      <div style={{display:"flex",gap:10,marginBottom:16}}>
        <button className="btn-primary" style={{flex:2}} onClick={()=>onNav("new")}>
          <Icon name="fuel" size={18} color="#000"/> Registrar Despacho
        </button>
        <button className="btn-ghost" onClick={onExport} title="Exportar CSV">
          <Icon name="download" size={16}/> CSV
        </button>
      </div>
    </div>
  );
}

// ─── New Record ───
function NewRecord({ fleet, onSave, onCancel, settings }) {
  const [step, setStep] = useState(1);
  const [saving, setSaving] = useState(false);
  const [form, setForm] = useState({
    equipoId:"", fecha:new Date().toISOString().split("T")[0],
    hora:new Date().toTimeString().slice(0,5), galones:"", horometro:"",
    odometro:"", tipoCombustible:"diesel", progresiva:"",
    operador:"", observaciones:"", costo:"", checklist:{},
  });

  const update = (k,v) => setForm(p => {
    const n = {...p, [k]:v};
    if((k==="galones"||k==="tipoCombustible") && n.galones) {
      const pr = n.tipoCombustible==="diesel" ? settings.precioDiesel : settings.precioGasoline;
      n.costo = (parseFloat(n.galones)*pr).toFixed(2);
    }
    return n;
  });
  const toggleCheck = (id) => setForm(p => ({...p, checklist:{...p.checklist,[id]:!p.checklist[id]}}));
  const handleSave = async () => { setSaving(true); try { await onSave(form); } catch(e) { setSaving(false); } };

  const critOk = CHECKLIST_ITEMS.filter(c=>c.critical).every(c=>form.checklist[c.id]);
  const canNext = form.equipoId && form.galones && parseFloat(form.galones)>0;
  const equipo = fleet.find(f=>f.id===form.equipoId);
  const isLiviano = equipo?.categoria==="Vehículo Liviano";

  return (
    <div className="scrollable">
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
        <button className="btn-ghost" onClick={onCancel} style={{padding:8}}><Icon name="back" size={20}/></button>
        <div>
          <h2 style={{fontSize:18,fontWeight:700}}>Nuevo Despacho</h2>
          <p style={{fontSize:12,color:"var(--text-muted)"}}>Paso {step} de 3</p>
        </div>
      </div>
      <div className="step-dots">
        {[1,2,3].map(s => <div key={s} className={`step-dot ${s<=step?"active":"inactive"}`}/>)}
      </div>

      {step===1 && (
        <div className="fade-in">
          <div className="card" style={{marginBottom:16}}>
            <p style={{fontSize:13,fontWeight:700,marginBottom:14}}>Equipo y Datos del Despacho</p>
            <div style={{marginBottom:14}}>
              <label>Equipo / Vehículo *</label>
              <select value={form.equipoId} onChange={e=>update("equipoId",e.target.value)}>
                <option value="">Seleccionar equipo...</option>
                <optgroup label="── Línea Amarilla ──">
                  {fleet.filter(f=>f.categoria==="Línea Amarilla").map(f => <option key={f.id} value={f.id}>{f.id} — {f.tipo}</option>)}
                </optgroup>
                <optgroup label="── Vehículos Livianos ──">
                  {fleet.filter(f=>f.categoria==="Vehículo Liviano").map(f => <option key={f.id} value={f.id}>{f.id} — {f.tipo}{f.placa?` (${f.placa})`:""}</option>)}
                </optgroup>
              </select>
            </div>
            <div className="grid-2" style={{marginBottom:14}}>
              <div><label>Fecha *</label><input type="date" value={form.fecha} onChange={e=>update("fecha",e.target.value)}/></div>
              <div><label>Hora *</label><input type="time" value={form.hora} onChange={e=>update("hora",e.target.value)}/></div>
            </div>
            <div className="grid-2" style={{marginBottom:14}}>
              <div><label>Tipo Combustible</label>
                <select value={form.tipoCombustible} onChange={e=>update("tipoCombustible",e.target.value)}>
                  <option value="diesel">Diesel B5 S-50</option>
                  <option value="gasolina">Gasolina 90</option>
                </select>
              </div>
              <div><label>Galones *</label><input type="number" step="0.1" min="0" placeholder="0.0" value={form.galones} onChange={e=>update("galones",e.target.value)}/></div>
            </div>
            <div className="grid-2" style={{marginBottom:14}}>
              <div><label>Horómetro (hrs)</label><input type="number" step="0.1" placeholder="Hrs" value={form.horometro} onChange={e=>update("horometro",e.target.value)}/></div>
              {isLiviano ? (
                <div><label>Odómetro (km)</label><input type="number" step="0.1" placeholder="Km" value={form.odometro} onChange={e=>update("odometro",e.target.value)}/></div>
              ) : (
                <div><label>Progresiva (km)</label><input type="text" placeholder="Ej: Km 14+500" value={form.progresiva} onChange={e=>update("progresiva",e.target.value)}/></div>
              )}
            </div>
            <div className="cost-box">
              <span style={{fontSize:13,fontWeight:600,color:"var(--amber)"}}>Costo estimado</span>
              <span className="mono" style={{fontSize:18,fontWeight:700,color:"var(--amber)"}}>S/ {form.costo||"0.00"}</span>
            </div>
          </div>
          <button className="btn-primary" style={{width:"100%"}} disabled={!canNext} onClick={()=>setStep(2)}>
            Continuar → Checklist DIA
          </button>
        </div>
      )}

      {step===2 && (
        <div className="fade-in">
          <div className="card" style={{marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
              <span style={{color:"var(--amber)"}}><Icon name="check" size={18}/></span>
              <p style={{fontSize:13,fontWeight:700}}>Checklist SSOMA — DIA Hanaqpampa</p>
            </div>
            <p style={{fontSize:11,color:"var(--text-muted)",marginBottom:16}}>
              Items con <span style={{color:"var(--red)"}}>●</span> son obligatorios según compromisos DIA Cap. 7
            </p>
            {CHECKLIST_ITEMS.map(item => (
              <button key={item.id} className="checklist-item" onClick={()=>toggleCheck(item.id)}>
                <div className={`checkbox ${form.checklist[item.id]?"checked":""}`}>
                  {form.checklist[item.id] && <svg viewBox="0 0 24 24" fill="none" stroke="#000" strokeWidth="3" width="14" height="14"><polyline points="20 6 9 17 4 12"/></svg>}
                </div>
                <div style={{flex:1}}>
                  <p style={{fontSize:13,fontWeight:form.checklist[item.id]?500:400,color:form.checklist[item.id]?"var(--text-primary)":"var(--text-secondary)"}}>
                    {item.critical && <span style={{color:"var(--red)",marginRight:4}}>●</span>}
                    {item.label}
                  </p>
                </div>
              </button>
            ))}
          </div>
          {!critOk && (
            <div className="alert-banner">
              <span style={{color:"var(--red)"}}><Icon name="alert" size={16}/></span>
              <p style={{fontSize:12,color:"var(--red)"}}>Items críticos pendientes. Puede continuar pero se generará alerta de incumplimiento DIA.</p>
            </div>
          )}
          <div style={{display:"flex",gap:10}}>
            <button className="btn-ghost" onClick={()=>setStep(1)} style={{flex:1}}>← Atrás</button>
            <button className="btn-primary" onClick={()=>setStep(3)} style={{flex:2}}>Continuar → Resumen</button>
          </div>
        </div>
      )}

      {step===3 && (
        <div className="fade-in">
          <div className="card" style={{marginBottom:16}}>
            <p style={{fontSize:13,fontWeight:700,marginBottom:14}}>Resumen del Despacho</p>
            <div style={{display:"grid",gap:10}}>
              {[
                ["Equipo",`${form.equipoId} — ${equipo?.tipo||""}`],
                ["Fecha/Hora",`${fmtDate(form.fecha)} ${form.hora}`],
                ["Combustible",form.tipoCombustible==="diesel"?"Diesel B5 S-50":"Gasolina 90"],
                ["Galones",`${form.galones} gal`],
                ["Costo",`S/ ${form.costo}`],
                form.horometro&&["Horómetro",`${form.horometro} hrs`],
                form.odometro&&["Odómetro",`${form.odometro} km`],
                form.progresiva&&["Progresiva",form.progresiva],
              ].filter(Boolean).map(([l,v],i) => (
                <div key={i} className="flex-between row-border">
                  <span style={{fontSize:12,color:"var(--text-muted)"}}>{l}</span>
                  <span className="mono" style={{fontSize:12,fontWeight:600}}>{v}</span>
                </div>
              ))}
            </div>
          </div>
          <div className="card" style={{marginBottom:16}}>
            <p style={{fontSize:13,fontWeight:700,marginBottom:10}}>Cumplimiento SSOMA</p>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <span className={`tag ${critOk?"tag-green":"tag-red"}`}>{critOk?"✓ DIA OK":"✗ DIA INCUMPLE"}</span>
              <span className="tag tag-blue">{Object.values(form.checklist).filter(Boolean).length}/{CHECKLIST_ITEMS.length} verificados</span>
            </div>
          </div>
          <div style={{marginBottom:14}}>
            <label>Operador Responsable</label>
            <input type="text" placeholder="Nombre del operador del equipo" value={form.operador} onChange={e=>update("operador",e.target.value)}/>
          </div>
          <div style={{marginBottom:14}}>
            <label>Observaciones</label>
            <textarea rows={3} placeholder="Novedades, condiciones del equipo..." value={form.observaciones} onChange={e=>update("observaciones",e.target.value)} style={{resize:"vertical"}}/>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button className="btn-ghost" onClick={()=>setStep(2)} style={{flex:1}} disabled={saving}>← Atrás</button>
            <button className="btn-primary" onClick={handleSave} style={{flex:2}} disabled={saving}>
              {saving ? "Guardando..." : "✓ Guardar en la Nube"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Records List ───
function RecordsList({ fleet, records, onNav, onDetail, onExport }) {
  const [filter, setFilter] = useState("");
  const filtered = records.filter(r => {
    if(!filter) return true;
    const q = filter.toLowerCase();
    return r.equipoId?.toLowerCase().includes(q) || r.operador?.toLowerCase().includes(q) || r.creadoPor?.toLowerCase().includes(q) || r.fecha?.includes(q);
  });

  return (
    <div className="scrollable">
      <div className="flex-between" style={{marginBottom:14}}>
        <h2 style={{fontSize:18,fontWeight:700}}>Registros</h2>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span className="tag tag-amber">{records.length} total</span>
          <button className="btn-ghost" onClick={onExport} style={{padding:"6px 10px"}} title="Exportar CSV"><Icon name="download" size={16}/></button>
        </div>
      </div>
      <input type="text" placeholder="Buscar por equipo, operador, usuario..." value={filter} onChange={e=>setFilter(e.target.value)} style={{marginBottom:14}}/>
      {filtered.length===0 ? (
        <div className="card" style={{textAlign:"center",padding:40}}>
          <p style={{color:"var(--text-muted)",fontSize:14}}>No hay registros{filter?" con ese filtro":""}</p>
          <button className="btn-primary" style={{marginTop:16}} onClick={()=>onNav("new")}>+ Nuevo Despacho</button>
        </div>
      ) : filtered.map(r => {
        const eq = fleet.find(f=>f.id===r.equipoId);
        return (
          <div key={r.id} className="card" style={{marginBottom:10,cursor:"pointer"}} onClick={()=>onDetail(r)}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                  <span style={{fontWeight:700,fontSize:14}}>{r.equipoId}</span>
                  <span className={`tag ${r.diaOk?"tag-green":"tag-red"}`} style={{fontSize:9}}>{r.diaOk?"DIA OK":"ALERTA"}</span>
                </div>
                <p style={{fontSize:11,color:"var(--text-muted)"}}>{eq?.tipo||""} · {fmtDate(r.fecha)} {r.hora}</p>
                {r.operador && <p style={{fontSize:11,color:"var(--text-muted)",marginTop:2}}>Op: {r.operador}</p>}
                {r.creadoPor && <p style={{fontSize:10,color:"var(--text-muted)",marginTop:2,fontStyle:"italic"}}>Registrado por: {r.creadoPor}</p>}
              </div>
              <div style={{textAlign:"right"}}>
                <p className="mono" style={{fontSize:16,fontWeight:700,color:"var(--amber)"}}>{parseFloat(r.galones).toFixed(1)}</p>
                <p style={{fontSize:10,color:"var(--text-muted)"}}>galones</p>
                <p className="mono" style={{fontSize:11,color:"var(--green)",marginTop:2}}>S/{parseFloat(r.costo||0).toFixed(2)}</p>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── Record Detail ───
function RecordDetail({ fleet, record, onBack, onDelete }) {
  const eq = fleet.find(f=>f.id===record.equipoId);
  const ch = record.checklist||{};
  
  return (
    <div className="scrollable">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button className="btn-ghost" onClick={onBack} style={{padding:8}}><Icon name="back" size={20}/></button>
          <h2 style={{fontSize:18,fontWeight:700}}>Detalle</h2>
        </div>
        <button className="btn-ghost" onClick={()=>onDelete(record.id)} style={{padding:8,color:"var(--red)",borderColor:"rgba(239,68,68,0.3)"}}>
          <Icon name="trash" size={16} color="var(--red)"/>
        </button>
      </div>
      <div className="card" style={{marginBottom:16}}>
        <div className="flex-between" style={{marginBottom:16}}>
          <div>
            <p style={{fontWeight:700,fontSize:18}}>{record.equipoId}</p>
            <p style={{fontSize:12,color:"var(--text-muted)"}}>{eq?.tipo} · {eq?.categoria}</p>
            {eq?.placa && <span className="tag tag-blue" style={{marginTop:4}}>{eq.placa}</span>}
          </div>
          <div style={{textAlign:"right"}}>
            <p className="mono" style={{fontSize:28,fontWeight:700,color:"var(--amber)"}}>{parseFloat(record.galones).toFixed(1)}</p>
            <p style={{fontSize:11,color:"var(--text-muted)"}}>galones</p>
          </div>
        </div>
        <div style={{display:"grid",gap:10}}>
          {[
            ["Fecha",fmtDate(record.fecha)],["Hora",record.hora],
            ["Combustible",record.tipoCombustible==="diesel"?"Diesel B5 S-50":"Gasolina 90"],
            ["Costo",`S/ ${parseFloat(record.costo||0).toFixed(2)}`],
            record.horometro&&["Horómetro",`${record.horometro} hrs`],
            record.odometro&&["Odómetro",`${record.odometro} km`],
            record.progresiva&&["Progresiva",record.progresiva],
            record.operador&&["Operador",record.operador],
            record.creadoPor&&["Registrado por",record.creadoPor],
          ].filter(Boolean).map(([l,v],i)=>(
            <div key={i} className="flex-between row-border">
              <span style={{fontSize:12,color:"var(--text-muted)"}}>{l}</span>
              <span className="mono" style={{fontSize:12,fontWeight:600}}>{v}</span>
            </div>
          ))}
        </div>
      </div>
      <div className="card" style={{marginBottom:16}}>
        <div className="flex-between" style={{marginBottom:12}}>
          <p style={{fontSize:13,fontWeight:700}}>Checklist SSOMA</p>
          <span className={`tag ${record.diaOk?"tag-green":"tag-red"}`}>{record.diaOk?"DIA CUMPLE":"DIA INCUMPLE"}</span>
        </div>
        {CHECKLIST_ITEMS.map(item => (
          <div key={item.id} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0",borderBottom:"1px solid var(--border)"}}>
            <span style={{fontSize:14}}>{ch[item.id]?"✅":"❌"}</span>
            <span style={{fontSize:12,color:ch[item.id]?"var(--text-primary)":"var(--red)",flex:1}}>
              {item.critical && !ch[item.id] && <span style={{color:"var(--red)",fontWeight:700}}>[CRÍTICO] </span>}
              {item.label}
            </span>
          </div>
        ))}
      </div>
      {record.observaciones && (
        <div className="card" style={{marginBottom:16}}>
          <p style={{fontSize:13,fontWeight:700,marginBottom:8}}>Observaciones</p>
          <p style={{fontSize:13,color:"var(--text-secondary)",lineHeight:1.6}}>{record.observaciones}</p>
        </div>
      )}
    </div>
  );
}

// ─── Fleet ───
function FleetView({ fleet, records }) {
  const [cat, setCat] = useState("all");
  const stats = fleet.map(f => {
    const fr = records.filter(r=>r.equipoId===f.id);
    const gal = fr.reduce((s,r)=>s+(parseFloat(r.galones)||0),0);
    const cost = fr.reduce((s,r)=>s+(parseFloat(r.costo)||0),0);
    return {...f, gal, cost, count:fr.length, last:fr[0]};
  }).filter(f => cat==="all" || f.categoria===cat);

  return (
    <div className="scrollable">
      <h2 style={{fontSize:18,fontWeight:700,marginBottom:14}}>Flota del Proyecto</h2>
      <div style={{display:"flex",gap:8,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
        {["all","Línea Amarilla","Vehículo Liviano"].map(c => (
          <button key={c} className={cat===c?"btn-primary":"btn-ghost"} onClick={()=>setCat(c)} style={{whiteSpace:"nowrap",fontSize:12,padding:"8px 14px"}}>
            {c==="all"?"Todos ("+fleet.length+")":c}
          </button>
        ))}
      </div>
      <p style={{fontSize:11,color:"var(--text-muted)",marginBottom:12}}>{stats.length} equipos · Consumo acumulado del proyecto</p>
      {stats.map(f => (
        <div key={f.id} className="card" style={{marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <p style={{fontWeight:700,fontSize:14}}>{f.id}</p>
              <p style={{fontSize:11,color:"var(--text-muted)"}}>{f.tipo}</p>
              {f.placa && <span className="tag tag-blue" style={{marginTop:4}}>{f.placa}</span>}
            </div>
            <div style={{textAlign:"right"}}>
              <p className="mono" style={{fontSize:16,fontWeight:700,color:f.gal>0?"var(--amber)":"var(--text-muted)"}}>
                {f.gal.toFixed(1)} <span style={{fontSize:10,fontWeight:400}}>gal</span>
              </p>
              {f.cost>0 && <p className="mono" style={{fontSize:11,color:"var(--green)"}}>S/{f.cost.toFixed(0)}</p>}
              <p style={{fontSize:10,color:"var(--text-muted)",marginTop:2}}>{f.count} despachos</p>
            </div>
          </div>
          {f.last && (
            <p style={{fontSize:10,color:"var(--text-muted)",marginTop:8,borderTop:"1px solid var(--border)",paddingTop:6}}>
              Último: {fmtDate(f.last.fecha)} · {parseFloat(f.last.galones).toFixed(1)} gal
            </p>
          )}
        </div>
      ))}
    </div>
  );
}

// ─── Settings ───
function SettingsView({ settings, onSave, records, currentUser, onChangeUser }) {
  const [local, setLocal] = useState(settings);
  const [saving, setSaving] = useState(false);

  const handleSave = async () => { setSaving(true); await onSave(local); setSaving(false); };

  return (
    <div className="scrollable">
      <h2 style={{fontSize:18,fontWeight:700,marginBottom:20}}>Configuración</h2>
      
      <div className="card" style={{marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
          <div style={{background:"var(--amber-glow)",borderRadius:8,padding:8,display:"flex"}}><Icon name="user" size={16} color="var(--amber)"/></div>
          <div style={{flex:1}}>
            <p style={{fontSize:11,color:"var(--text-muted)"}}>USUARIO ACTUAL</p>
            <p style={{fontSize:15,fontWeight:700}}>{currentUser}</p>
          </div>
          <button className="btn-ghost" onClick={onChangeUser} style={{fontSize:11,padding:"6px 12px"}}>Cambiar</button>
        </div>
      </div>

      <div className="card" style={{marginBottom:16}}>
        <p style={{fontSize:13,fontWeight:700,marginBottom:14}}>Precios de Combustible</p>
        <div style={{marginBottom:14}}>
          <label>Precio Diesel B5 S-50 (S/. por galón)</label>
          <input type="number" step="0.10" value={local.precioDiesel} onChange={e=>setLocal(p=>({...p,precioDiesel:parseFloat(e.target.value)||0}))}/>
        </div>
        <div>
          <label>Precio Gasolina 90 (S/. por galón)</label>
          <input type="number" step="0.10" value={local.precioGasoline} onChange={e=>setLocal(p=>({...p,precioGasoline:parseFloat(e.target.value)||0}))}/>
        </div>
      </div>
      <div className="card" style={{marginBottom:16}}>
        <p style={{fontSize:13,fontWeight:700,marginBottom:14}}>Alertas</p>
        <label>Alerta consumo por despacho (galones)</label>
        <input type="number" step="1" value={local.alertaConsumo} onChange={e=>setLocal(p=>({...p,alertaConsumo:parseFloat(e.target.value)||0}))}/>
      </div>
      <div className="card" style={{marginBottom:16}}>
        <p style={{fontSize:13,fontWeight:700,marginBottom:10}}>Información del Proyecto</p>
        <div style={{display:"grid",gap:8}}>
          {[
            ["Empresa","Tours Panasur E.I.R.L."],
            ["RUC","20532012879"],
            ["Proyecto","Acceso Principal CSF Hanaqpampa"],
            ["Cliente","ENGIE Energía Perú S.A.A."],
            ["Ubicación","Moquegua — 3,800–4,200 msnm"],
            ["Jefe SSOMA","Alvaro Ruiz Reyna (CIP 210152)"],
            ["Jefe Construcción","Ing. Víctor Cáceres Murillo (CIP 047901)"],
            ["Gerente General","Eugenio Huamaní Quispe"],
            ["Total Registros","" + records.length + " (nube Supabase)"],
          ].map(([k,v],i) => (
            <div key={i} className="flex-between row-border">
              <span style={{fontSize:12,color:"var(--text-muted)"}}>{k}</span>
              <span style={{fontSize:12,fontWeight:600,textAlign:"right",maxWidth:"55%"}}>{v}</span>
            </div>
          ))}
        </div>
      </div>
      <button className="btn-primary" style={{width:"100%",marginBottom:12}} onClick={handleSave} disabled={saving}>
        {saving?"Guardando...":"Guardar Configuración"}
      </button>
      <div style={{textAlign:"center",marginTop:20,marginBottom:20}}>
        <p style={{fontSize:10,color:"var(--text-muted)"}}>PANASUR — Control de Combustible v2.0</p>
        <p style={{fontSize:10,color:"var(--text-muted)"}}>Multi-usuario · Sincronización en la nube</p>
        <p style={{fontSize:10,color:"var(--text-muted)",marginTop:4}}>Desarrollo: INNOVAQ Solutions SAC © 2026</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
    </script>
</body>
