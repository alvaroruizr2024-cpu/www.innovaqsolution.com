const renderPage=()=>{
switch(active){
case 'dashboard':return React.createElement(Dashboard);
case 'map':return React.createElement(MapViewer);
case 'properties':return React.createElement(PropertyTable);
case 'ai':return React.createElement(AIEngines);
case 'roi':return React.createElement(ROISimulator);
case 'levantamiento':return React.createElement(LevantamientoCatastral);
case 'tributacion':return React.createElement(TributacionPredial);
case 'saneamiento':return React.createElement(SaneamientoLegal);
case 'planificacion':return React.createElement(PlanificacionTerritorial);
default:return React.createElement(Dashboard);
}};
return React.createElement('div',{style:{display:'flex',height:'100vh',width:'100vw',overflow:'hidden'}},
React.createElement(Sidebar,{active,setActive}),
React.createElement('div',{style:{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}},
React.createElement(Header),
React.createElement('div',{style:{flex:1,overflowY:'auto',padding:24,background:COLORS.bg}},renderPage())
));
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
