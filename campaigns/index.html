// PROMPT BOX (copyable)
// ═══════════════════════════════════════════════════════════════
function PromptBox({ label, icon, color, text, model }) {
  const [copied, setCopied] = useState(false);
  const copy = () => { navigator.clipboard.writeText(text); setCopied(true); setTimeout(() => setCopied(false), 2000); };

  return (
    <div style={{ background: '#12121e', borderRadius: 10, border: `1px solid ${color}33`, overflow: 'hidden', marginBottom: 10 }}>
      <div style={{ padding: '8px 12px', borderBottom: `1px solid ${color}22`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <span>{icon}</span>
          <span style={{ color, fontSize: 11, fontWeight: 700 }}>{label}</span>
          {model && <span style={{ color: '#555', fontSize: 9, background: '#1a1a2e', padding: '2px 6px', borderRadius: 4 }}>{model}</span>}
        </div>
        <button onClick={copy} style={{
          background: copied ? '#7AB648' : `${color}22`, border: `1px solid ${color}44`, borderRadius: 6,
          padding: '4px 10px', color: copied ? '#fff' : color, fontSize: 10, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit',
        }}>
          {copied ? '✅ Copiado' : '📋 Copiar'}
        </button>
      </div>
      <div style={{ padding: '10px 12px', maxHeight: 140, overflowY: 'auto' }}>
        <pre style={{ color: '#bbb', fontSize: 11, lineHeight: 1.5, fontFamily: "'SF Mono', monospace", whiteSpace: 'pre-wrap', wordBreak: 'break-word', margin: 0 }}>{text}</pre>
      </div>
    </div>
  );
}

                  </button>
                </div>
                <div style={{ padding: '14px 16px', maxHeight: 350, overflowY: 'auto' }}>
                  <pre style={{ color: '#ddd', fontSize: 12.5, lineHeight: 1.6, fontFamily: "'Segoe UI', sans-serif", whiteSpace: 'pre-wrap', wordBreak: 'break-word', margin: 0 }}>{current.text}</pre>
                </div>
              </div>

              {/* ELEVENLABS PROMPTS */}
              <div style={{ color: '#666', fontSize: 10, fontWeight: 700, letterSpacing: '0.08em', marginBottom: 8, display: 'flex', alignItems: 'center', gap: 6 }}>
                <span>🎨 PROMPTS PARA ELEVENLABS</span>
                <a href="https://elevenlabs.io/app/image-video" target="_blank" rel="noopener noreferrer" style={{ color: PLATFORMS[platform].color, textDecoration: 'none', fontSize: 10, background: `${PLATFORMS[platform].color}15`, padding: '2px 8px', borderRadius: 4, border: `1px solid ${PLATFORMS[platform].color}33` }}>
                  Abrir ElevenLabs →
                </a>
              </div>

              {/* Image prompt */}
              <PromptBox
                label="IMAGEN"
                icon="🖼️"
                color="#F1912B"
                model={current.elevenImage.model}
                text={current.elevenImage.prompt}
              />

              {/* Voice script (TikTok only) */}
              {current.voiceScript && (
                <PromptBox
                  label="VOZ (TTS con tu voz clonada)"
                  icon="🎤"
                  color="#FF0050"
                  model="Eleven v3 · Tu Voice Clone"
                  text={current.voiceScript}
                />
              )}

              {/* Video prompt (TikTok only) */}
              {current.videoPrompt && (
                <PromptBox
                  label="VIDEO"
                  icon="🎬"
                  color="#00F2EA"
                  model={current.videoPrompt.model}
                  text={`[${current.videoPrompt.duration} · ${current.videoPrompt.aspect}]\n\n${current.videoPrompt.prompt}`}
                />
              )}

              {/* Workflow guide */}
              {current.videoPrompt && (
                <div style={{ background: '#14142a', borderRadius: 10, border: '1px solid #252540', padding: 14, marginTop: 10 }}>
                  <div style={{ color: '#F1912B', fontSize: 11, fontWeight: 700, marginBottom: 8 }}>📋 FLUJO DE PRODUCCIÓN EN ELEVENLABS:</div>
                  <div style={{ color: '#999', fontSize: 11, lineHeight: 1.7 }}>
                    <strong style={{ color: '#fff' }}>1.</strong> Ir a <strong style={{ color: '#00F2EA' }}>Image & Video</strong> → pegar prompt de imagen → generar con {current.elevenImage.model}<br/>
                    <strong style={{ color: '#fff' }}>2.</strong> Con la imagen generada → seleccionar <strong style={{ color: '#00F2EA' }}>Generate Video</strong> → usar como Start Frame<br/>
                    <strong style={{ color: '#fff' }}>3.</strong> Pegar prompt de video → modelo {current.videoPrompt.model} → generar clip {current.videoPrompt.duration}<br/>
                    <strong style={{ color: '#fff' }}>4.</strong> Click <strong style={{ color: '#FF0050' }}>Export to Studio</strong><br/>
                    <strong style={{ color: '#fff' }}>5.</strong> En Studio → agregar <strong style={{ color: '#FF0050' }}>tu voz clonada</strong> → pegar script de voz<br/>
                    <strong style={{ color: '#fff' }}>6.</strong> Activar <strong style={{ color: '#7AB648' }}>LipSync</strong> + Auto-captions → Exportar MP4
                  </div>
                </div>
              )}
            </div>

            {/* RIGHT: Image preview + Stats */}
            <div style={{ position: 'sticky', top: 70 }}>
              <div style={{ color: '#555', fontSize: 10, fontWeight: 700, letterSpacing: '0.06em', marginBottom: 8 }}>📷 PREVIEW DE IMAGEN</div>
              <ImagePreview post={current} />

              <div style={{ marginTop: 12, background: '#14142a', borderRadius: 10, border: '1px solid #252540', padding: 12 }}>
                <div style={{ color: '#888', fontSize: 10, marginBottom: 6 }}>
                  <strong style={{ color: '#fff' }}>Modelo:</strong> {current.elevenImage.model} · <strong style={{ color: '#fff' }}>Formato:</strong> 1080×1080 PNG
                </div>
                {current.videoPrompt && (
                  <div style={{ color: '#888', fontSize: 10, marginBottom: 6 }}>
                    <strong style={{ color: '#00F2EA' }}>Video:</strong> {current.videoPrompt.model} · {current.videoPrompt.duration} · {current.videoPrompt.aspect}
                  </div>
                )}
                {current.voiceScript && (
                  <div style={{ color: '#888', fontSize: 10 }}>
                    <strong style={{ color: '#FF0050' }}>Voz:</strong> Eleven v3 · Tu Voice Clone · LipSync activado
                  </div>
                )}
              </div>

              {/* Campaign summary */}
              <div style={{ marginTop: 12, background: '#14142a', borderRadius: 10, border: '1px solid #252540', padding: 12 }}>
                <div style={{ color: '#555', fontSize: 9, fontWeight: 700, letterSpacing: '0.06em', marginBottom: 8 }}>📊 RESUMEN PRODUCCIÓN</div>
                {Object.entries(PLATFORMS).map(([k, p]) => {
                  const cnt = POSTS.filter(x => x.platform === k).length;
                  const imgs = cnt;
                  const vids = POSTS.filter(x => x.platform === k && x.videoPrompt).length;
                  const voice = POSTS.filter(x => x.platform === k && x.voiceScript).length;
                  return (
                    <div key={k} style={{ display: 'flex', justifyContent: 'space-between', padding: '4px 0', borderBottom: '1px solid #1a1a2e', fontSize: 11 }}>
                      <span style={{ color: '#888' }}>{p.icon} {p.name}</span>
                      <span style={{ color: '#fff', fontWeight: 600 }}>{imgs}📷 {vids > 0 ? `${vids}🎬 ${voice}🎤` : ''}</span>
                    </div>
                  );
                })}
                <div style={{ display: 'flex', justifyContent: 'space-between', padding: '6px 0 0', marginTop: 4, borderTop: '1px solid #333', fontSize: 12 }}>
                  <span style={{ color: B.orange, fontWeight: 700 }}>TOTAL</span>
                  <span style={{ color: '#fff', fontWeight: 800 }}>20📷 5🎬 5🎤</span>
                </div>
              </div>

              {/* Quick links */}
              <div style={{ marginTop: 12, display: 'flex', flexDirection: 'column', gap: 6 }}>
                {[
                  { label: 'ElevenLabs Image & Video', url: 'https://elevenlabs.io/app/image-video', color: '#F1912B' },
                  { label: 'ElevenLabs Studio', url: 'https://elevenlabs.io/app/studio', color: '#00F2EA' },
                  { label: 'ElevenLabs Voice Clone', url: 'https://elevenlabs.io/app/voice-lab', color: '#FF0050' },
                ].map(link => (
                  <a key={link.url} href={link.url} target="_blank" rel="noopener noreferrer" style={{
                    display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
                    background: `${link.color}15`, border: `1px solid ${link.color}33`, borderRadius: 8,
                    padding: '8px 14px', color: link.color, fontSize: 11, fontWeight: 700, textDecoration: 'none',
                  }}>
                    {link.label} ↗
                  </a>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ElevenLabsStudio));
    </script>
</body>
</html>
